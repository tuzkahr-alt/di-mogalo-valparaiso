backend:
  name: git-gateway
  branch: master
media_folder: "."
public_folder: "/"
collections:
  - name: "pages"
    label: "Administración de Hostal Di Mogalo"
    files:
      - label: "Edición de Toda la Página"
        name: "site_editor"
        file: "data/content.json"
        fields:
          # --- IDENTIDAD ---
          - {label: "--- IDENTIDAD Y LOGOS ---", name: "header_brand", widget: "hidden", default: "brand_section"}
          - {label: "Nombre del Hostal", name: "hostal_name", widget: "string", hint: "Nombre oficial"}
          - {label: "Logo Principal", name: "logo", widget: "image", hint: "Aparece en la parte superior"}
          - {label: "Logo Footer", name: "footer_logo", widget: "image", hint: "Aparece en la parte inferior"}

          # --- SECCIÓN HERO ---
          - {label: "--- PORTADA (HERO) ---", name: "header_hero", widget: "hidden", default: "hero_section"}
          - {label: "Contenido Hero", name: "hero", widget: "object", fields: [
              {label: "Gran Título de Portada", name: "title", widget: "string"},
              {label: "Subtítulo Descriptivo", name: "subtitle", widget: "text"},
              {label: "Imagen de Fondo de Portada", name: "background", widget: "image"}
            ]}

          # --- SECCIÓN EXPERIENCIA ---
          - {label: "--- SECCIÓN EXPERIENCIA ---", name: "header_exp", widget: "hidden", default: "exp_section"}
          - {label: "Etiqueta Superior", name: "exp_section_title", widget: "string", hint: "Ej: Experiencia Di Mogalo"}
          - {label: "Experiencia Principal", name: "experience", widget: "object", fields: [
              {label: "Frase Destacada", name: "title", widget: "text"},
              {label: "Lista de 3 Puntos Clave", name: "items", widget: "list", fields: [
                {label: "Icono (moon, coffee, etc)", name: "icon", widget: "string"},
                {label: "Texto descriptivo corto", name: "text", widget: "string"}
              ]}
            ]}

          # --- SECCIÓN HABITACIONES ---
          - {label: "--- SECCIÓN HABITACIONES ---", name: "header_rooms", widget: "hidden", default: "rooms_section"}
          - {label: "Título de Sección Habitaciones", name: "rooms_title_text", widget: "string"}
          - {label: "Nuestras Habitaciones", name: "rooms", widget: "list", fields: [
              {label: "Nombre habitación", name: "title", widget: "string"},
              {label: "Descripción de la habitación", name: "description", widget: "text"},
              {label: "Foto de la habitación", name: "image", widget: "image"},
              {label: "Comodidades (lista)", name: "features", widget: "list", summary: "{{fields.feature}}"}
            ]}

          # --- SECCIÓN SERVICIOS ---
          - {label: "--- SECCIÓN SERVICIOS ---", name: "header_serv", widget: "hidden", default: "serv_section"}
          - {label: "Título de Sección Servicios", name: "services_title_text", widget: "string"}
          - {label: "Lista de Servicios", name: "services", widget: "list", fields: [
              {label: "Icono", name: "icon", widget: "string"},
              {label: "Título del servicio", name: "title", widget: "string"},
              {label: "Descripción breve", name: "text", widget: "string"}
            ]}

          # --- SECCIÓN TIPS ---
          - {label: "--- SECCIÓN TIPS Y TURISMO ---", name: "header_tips", widget: "hidden", default: "tips_section"}
          - {label: "Título Sección Tips", name: "tips_title_main", widget: "string"}
          - {label: "Párrafo Introductorio", name: "tips_desc_main", widget: "text"}
          - {label: "Consejos Turísticos", name: "tips", widget: "list", fields: [
              {label: "Icono", name: "icon", widget: "string"},
              {label: "Título de la recomendación", name: "title", widget: "string"},
              {label: "Descripción del consejo", name: "text", widget: "text"}
            ]}

          # --- SECCIÓN CONTACTO ---
          - {label: "--- UBICACIÓN Y CONTACTO ---", name: "header_contact", widget: "hidden", default: "contact_section"}
          - {label: "Datos de Contacto", name: "contact", widget: "object", fields: [
              {label: "WhatsApp (+569...)", name: "whatsapp", widget: "string"},
              {label: "Link Facebook", name: "facebook", widget: "string"},
              {label: "Dirección Escrita", name: "address", widget: "string"},
              {label: "Maps Embed URL", name: "gmaps_embed", widget: "string"}
            ]}

          # --- SECCIÓN RESEÑAS ---
          - {label: "--- SECCIÓN RESEÑAS ---", name: "header_revs", widget: "hidden", default: "reviews_section"}
          - {label: "Título Sección Reseñas", name: "reviews_title_text", widget: "string"}
          - {label: "Comentarios de Huéspedes", name: "reviews", widget: "list", fields: [
              {label: "Estrellas (ej: ★★★★★)", name: "stars", widget: "string"},
              {label: "Comentario", name: "text", widget: "text"},
              {label: "Nombre Cliente", name: "client", widget: "string"}
            ]}

          # --- CTA FINAL ---
          - {label: "--- LLAMADA A LA ACCIÓN FINAL ---", name: "header_cta", widget: "hidden", default: "cta_section"}
          - {label: "Título Final (Urgencia)", name: "cta_title", widget: "string"}
          - {label: "Descripción de Cierre", name: "cta_desc", widget: "text"}
          - {label: "Texto del Botón WhatsApp", name: "cta_button_text", widget: "string"}
